name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master, main]

jobs:
  backend:
    name: Backend — Lint, Type-check, Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install all dependencies
        run: npm ci

      - name: Lint
        working-directory: apps/backend
        run: npm run lint

      - name: Type-check
        working-directory: apps/backend
        run: npx tsc --noEmit

      - name: Build
        working-directory: apps/backend
        run: npm run build

      - name: Run tests with coverage
        working-directory: apps/backend
        run: npm run test:cov -- --json --outputFile=../../test-results-backend.json
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://placeholder.supabase.co' }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'placeholder-service-key' }}
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'placeholder-jwt-secret-for-ci-only-32chars' }}

      - name: Enforce minimum test count (backend)
        run: |
          TOTAL=$(node -e "const r=require('./test-results-backend.json'); console.log(r.numTotalTests)")
          echo "Backend tests found: $TOTAL"
          if [ "$TOTAL" -lt 40 ]; then
            echo "❌ FAIL: Expected at least 40 backend tests, found $TOTAL"
            exit 1
          fi
          echo "✅ PASS: $TOTAL backend tests found (minimum: 40)"

      - name: Post backend test summary
        if: always()
        run: |
          TOTAL=$(node -e "const r=require('./test-results-backend.json'); console.log(r.numTotalTests)" 2>/dev/null || echo "N/A")
          PASSED=$(node -e "const r=require('./test-results-backend.json'); console.log(r.numPassedTests)" 2>/dev/null || echo "N/A")
          FAILED=$(node -e "const r=require('./test-results-backend.json'); console.log(r.numFailedTests)" 2>/dev/null || echo "N/A")
          SUITES=$(node -e "const r=require('./test-results-backend.json'); console.log(r.numTotalTestSuites)" 2>/dev/null || echo "N/A")
          echo "## 🧪 Backend Test Results" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suites | $SUITES |" >> $GITHUB_STEP_SUMMARY
          echo "| Total Tests | $TOTAL |" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
          echo "| ❌ Failed | $FAILED |" >> $GITHUB_STEP_SUMMARY

      - name: Upload backend coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: apps/backend/coverage/
          if-no-files-found: ignore

  frontend:
    name: Frontend — Lint, Type-check, Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install all dependencies
        run: npm ci

      - name: Lint
        working-directory: apps/frontend
        run: npm run lint

      - name: Type-check
        working-directory: apps/frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: apps/frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001

      - name: Run tests with coverage
        working-directory: apps/frontend
        run: npm run test:coverage -- --json --outputFile=../../test-results-frontend.json
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001

      - name: Enforce minimum test count (frontend)
        run: |
          TOTAL=$(node -e "const r=require('./test-results-frontend.json'); console.log(r.numTotalTests)")
          echo "Frontend tests found: $TOTAL"
          if [ "$TOTAL" -lt 50 ]; then
            echo "❌ FAIL: Expected at least 50 frontend tests, found $TOTAL"
            exit 1
          fi
          echo "✅ PASS: $TOTAL frontend tests found (minimum: 50)"

      - name: Post frontend test summary
        if: always()
        run: |
          TOTAL=$(node -e "const r=require('./test-results-frontend.json'); console.log(r.numTotalTests)" 2>/dev/null || echo "N/A")
          PASSED=$(node -e "const r=require('./test-results-frontend.json'); console.log(r.numPassedTests)" 2>/dev/null || echo "N/A")
          FAILED=$(node -e "const r=require('./test-results-frontend.json'); console.log(r.numFailedTests)" 2>/dev/null || echo "N/A")
          SUITES=$(node -e "const r=require('./test-results-frontend.json'); console.log(r.numTotalTestSuites)" 2>/dev/null || echo "N/A")
          echo "## 🧪 Frontend Test Results" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suites | $SUITES |" >> $GITHUB_STEP_SUMMARY
          echo "| Total Tests | $TOTAL |" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
          echo "| ❌ Failed | $FAILED |" >> $GITHUB_STEP_SUMMARY

      - name: Upload frontend coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: apps/frontend/coverage/
          if-no-files-found: ignore

  all-checks-passed:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - name: Confirm all jobs succeeded
        run: |
          echo "## ✅ All CI Checks Passed" >> $GITHUB_STEP_SUMMARY
          echo "- Backend: lint, type-check, build, tests ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: lint, type-check, build, tests ✅" >> $GITHUB_STEP_SUMMARY
          echo "All CI checks passed successfully."
